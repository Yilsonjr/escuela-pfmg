# ─────────────────────────────────────────────
# netlify.toml — Configuración de despliegue
# Escuela Primaria Prof. Felipe Montes Gómez
# ─────────────────────────────────────────────

[build]
  # Comando para construir el proyecto
  command = "npm run build"

  # Carpeta que Netlify publica (Next.js genera aquí)
  publish = ".next"

  # Variables de entorno solo para el proceso de BUILD
  # (las sensibles van en el panel de Netlify, no aquí)
  [build.environment]
    NODE_VERSION = "20"
    NEXT_TELEMETRY_DISABLED = "1"

# Plugin oficial de Next.js — habilita Server Actions,
# API Routes, Middleware y SSR en Netlify
[[plugins]]
  package = "@netlify/plugin-nextjs"

# ── Cabeceras de seguridad para todas las páginas ──
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"

# ── Caché larga para archivos estáticos de Next.js ──
[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
